# CS1237 Load Cell Probe — Qidi Q2 Configuration
#
# Replaces [probe_air] with the mainline load_cell_probe system.
# Sensor: CS1237 24-bit ADC, bit-banged via THR board pins PB3/PB4.
#
# Prerequisites:
#   - NumPy must be installed in klippy-env (usually already present)
#   - SciPy may be required for SOS filter design; if Klipper fails to start
#     with an import error run:
#       ~/klippy-env/bin/pip install scipy
#
# Calibration workflow (after first deploy):
#   1. LOAD_CELL_DIAGNOSTIC
#      - verify expected sample rate and reasonable noise/variation.
#   2. If you need more space to place a scale on the bed:
#      - run Fake_Home_Z (sets Z=0)
#      - lower the bed by increasing Z via the UI.
#   3. Place a tared kitchen scale on the bed.
#   4. Run Fake_Home_Z_MAX so Z motion is controllable for calibration.
#   5. Start calibration:
#      - LOAD_CELL_CALIBRATE
#      - TARE (with no nozzle contact force)
#   6. Raise bed into nozzle slowly (decrease Z), then fine-step in 0.10/0.05mm
#      increments until the scale reads around >=1000g.
#   7. Run CALIBRATE GRAMS=<scale reading> (example: CALIBRATE GRAMS=1001).
#   8. Finalize and persist:
#      - ACCEPT
#      - SAVE_CONFIG
#
# After calibration, verify with:
#   - LOAD_CELL_DIAGNOSTIC
#   - LOAD_CELL_TEST_TAP
#
# See docs/LOAD_CELL_CALIBRATION.md for full details.

[load_cell_probe]
sensor_type: cs1237
sclk_pin: THR:PB3
dout_pin: THR:PB4
# Sample rate: 10 / 40 / 640 / 1280 SPS
# 640 is reliable on Q2 THR; 1280 may overflow/MONITOR on tap test
sample_rate: 640
# Host processes MCU bulk data at this interval (seconds). Larger values
# reduce klippy CPU; 0.25 is a good balance at 1280 SPS. Use 0.10 during
# calibration or if you see bulk overflow errors in the log.
host_batch_interval: 0.5
# Live force_g in Moonraker/UI status (extra CPU). Enable only if needed:
# force_status: True
# Gain: 1 / 2 / 64 / 128 — 128 gives maximum sensitivity for load cells
gain: 128
# Z offset from nozzle to bed at trigger point.
# Set to 0 initially; adjust after first probe calibration.
z_offset: 0
# Probe motion parameters
speed: 5
lift_speed: 5
samples: 2
sample_retract_dist: 3
samples_result: average
samples_tolerance: 0.02
samples_tolerance_retries: 10
# Force threshold in grams that counts as a tap.
# 75g is conservative for a direct-drive setup; lower if probe misses taps.
trigger_force: 75
# Uncomment and fill in after running LOAD_CELL_CALIBRATE:
#counts_per_gram: ...
#reference_tare_counts: ...
